name: Build & Release (Azure DevOps Migration Tools)

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: ["main"]
    tags-ignore: ["v*-*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      ForceRelease:
        description: "Force a release even if no src changes detected."
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

jobs:
  # ────────────────────────────────────────────
  # Setup & Configuration
  # ────────────────────────────────────────────
  Setup:
    name: "Setup & Configuration"
    runs-on: ubuntu-latest
    outputs:
      GitVersion_BranchName: ${{ steps.gitversion.outputs.GitVersion_BranchName }}
      GitVersion_SemVer: ${{ steps.gitversion.outputs.GitVersion_SemVer }}
      GitVersion_PreReleaseLabel: ${{ steps.gitversion.outputs.GitVersion_PreReleaseLabel }}
      GitVersion_AssemblySemVer: ${{ steps.gitversion.outputs.GitVersion_AssemblySemVer }}
      GitVersion_InformationalVersion: ${{ steps.gitversion.outputs.GitVersion_InformationalVersion }}
      GitVersion_NuGetVersion: ${{ steps.gitversion.outputs.GitVersion_NuGetVersion }}
      GitVersion_PreReleaseNumber: ${{ steps.gitversion.outputs.GitVersion_PreReleaseNumber }}
      GitVersion_MajorMinorPatch: ${{ steps.gitversion.outputs.GitVersion_MajorMinorPatch }}
      HasChanged_src: ${{ steps.filter.outputs.src }}
      HasChanged_docs: ${{ steps.filter.outputs.docs }}
      HasChanged_automation: ${{ steps.filter.outputs.automation }}
      nkdAgility_Ring: ${{ steps.RingDetection.outputs.Ring }}
      nkdAgility_RunRelease: ${{ steps.nkdagility.outputs.RunRelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.0.2
        with:
          versionSpec: "5.x"
          includePrerelease: true

      - name: Execute GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.0.2
        with:
          useConfigFile: true

      - name: "Ring Detection"
        shell: pwsh
        id: RingDetection
        run: |
          $preReleaseLabel = "${{ steps.gitversion.outputs.GitVersion_PreReleaseLabel }}"
          $Ring = switch ($preReleaseLabel) {
              ""        { "Production" }
              "Preview" { "Preview" }
              default   { "Canary" }
          }
          Write-Output "Ring=$Ring"
          echo "Ring=$Ring" >> $env:GITHUB_OUTPUT

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: json
          filters: |
            src:
              - 'src/**'
            docs:
              - 'docs/**'
            automation:
              - 'build/**'
              - '.github/workflows/**'

      - name: "Compute release decision"
        shell: pwsh
        id: nkdagility
        run: |
          $Ring = "${{ steps.RingDetection.outputs.Ring }}"
          $RunRelease = switch ($Ring) {
              "Production" { ('${{ inputs.ForceRelease }}' -eq 'true') -or ('${{ steps.filter.outputs.src }}' -eq 'true') }
              "Preview"    { ('${{ inputs.ForceRelease }}' -eq 'true') -or ('${{ steps.filter.outputs.src }}' -eq 'true') }
              default      { $false }
          }
          Write-Output "Ring=$Ring  RunRelease=$RunRelease"
          echo "RunRelease=$RunRelease" >> $env:GITHUB_OUTPUT

  # ────────────────────────────────────────────
  # Summary (always runs)
  # ────────────────────────────────────────────
  SetupSummary:
    name: "Build Run Data"
    runs-on: ubuntu-latest
    needs: Setup
    if: always()
    steps:
      - name: "Show Summary"
        shell: pwsh
        run: |
          $markdown = @"
          ## ${{ needs.Setup.outputs.GitVersion_SemVer }} (${{ needs.Setup.outputs.nkdAgility_Ring }})
          | Key | Value |
          |-----|-------|
          | Ring | ${{ needs.Setup.outputs.nkdAgility_Ring }} |
          | SemVer | ${{ needs.Setup.outputs.GitVersion_SemVer }} |
          | AssemblySemVer | ${{ needs.Setup.outputs.GitVersion_AssemblySemVer }} |
          | InformationalVersion | ${{ needs.Setup.outputs.GitVersion_InformationalVersion }} |
          | NuGetVersion | ${{ needs.Setup.outputs.GitVersion_NuGetVersion }} |
          | RunRelease | ${{ needs.Setup.outputs.nkdAgility_RunRelease }} |
          | HasChanged_src | ${{ needs.Setup.outputs.HasChanged_src }} |
          | HasChanged_docs | ${{ needs.Setup.outputs.HasChanged_docs }} |
          "@
          echo $markdown >> $Env:GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────
  # Build, Test & Package  (Windows – required for net472 + TFS Object Model)
  # ────────────────────────────────────────────
  build:
    name: "Build, Test & Package"
    runs-on: windows-latest
    needs: Setup
    if: >-
      success() && (
        needs.Setup.outputs.HasChanged_src == 'true' ||
        needs.Setup.outputs.HasChanged_automation == 'true' ||
        inputs.ForceRelease == true
      )
    env:
      buildConfiguration: "Release"
      GitVersion_SemVer: ${{ needs.Setup.outputs.GitVersion_SemVer }}
      GitVersion_AssemblySemVer: ${{ needs.Setup.outputs.GitVersion_AssemblySemVer }}
      GitVersion_InformationalVersion: ${{ needs.Setup.outputs.GitVersion_InformationalVersion }}
      GitVersion_NuGetVersion: ${{ needs.Setup.outputs.GitVersion_NuGetVersion }}
      GitVersion_PreReleaseLabel: ${{ needs.Setup.outputs.GitVersion_PreReleaseLabel }}
      GitVersion_MajorMinorPatch: ${{ needs.Setup.outputs.GitVersion_MajorMinorPatch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: cschleiden/replace-tokens@v1
        with:
          files: '["**/StaticVariables.cs"]'
          tokenPrefix: "${"
          tokenSuffix: "}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Build
        id: Build
        run: >-
          dotnet build MigrationTools.sln
          /p:Version=${{ env.GitVersion_SemVer }}
          /p:FileVersion=${{ env.GitVersion_AssemblySemVer }}
          /p:InformationalVersion=${{ env.GitVersion_InformationalVersion }}
          /p:GitVersionTag=${{ env.GitVersion_PreReleaseLabel }}

      - name: "Validate WITDataStore64 present"
        shell: pwsh
        run: |
          $found = Get-ChildItem -Path .\ -Recurse -Filter '*WITDataStore64*'
          if (-not $found) { Write-Error "WITDataStore64 not found"; exit 1 }
          Write-Output "Found WITDataStore64: $($found.FullName)"

      - name: "Test L0 + L1 (unit tests)"
        run: >-
          dotnet test MigrationTools.sln
          --results-directory .\test-results\
          --logger trx --collect "Code coverage"
          --no-build
          --filter "(TestCategory=L0|TestCategory=L1)"

      - name: "Test L2 + L3 (integration tests)"
        run: >-
          dotnet test MigrationTools.sln
          --results-directory .\test-results\
          --logger trx --collect "Code coverage"
          --no-build
          --filter "(TestCategory=L2|TestCategory=L3)"

      - name: "Test uncategorised"
        run: >-
          dotnet test MigrationTools.sln
          --results-directory .\test-results\
          --logger trx --collect "Code coverage"
          --no-build
          --filter "(TestCategory!=L0&TestCategory!=L1&TestCategory!=L2&TestCategory!=L3)"

      - name: "Package Executable"
        id: packageExecutable
        shell: pwsh
        if: steps.Build.outcome == 'success'
        run: |
          ./build/packageExecutable.ps1 -version ${{ env.GitVersion_SemVer }} -outfolder "./staging"

      - name: "Package Chocolatey (nupkg only – no push)"
        shell: pwsh
        if: steps.packageExecutable.outcome == 'success'
        run: |
          $zip = Get-ChildItem -Path ./staging/ -Recurse -Filter 'MigrationTools-${{ env.GitVersion_SemVer }}.zip' | Select-Object -First 1
          .\build\packageChocolatey.ps1 -SemVer ${{ env.GitVersion_SemVer }} -NuGetVersion ${{ env.GitVersion_NuGetVersion }} -outfolder "./staging" -migrationToolsFilename $zip.FullName

      - name: "Package Extension (vsix only – no push)"
        shell: pwsh
        if: steps.Build.outcome == 'success'
        run: |
          .\build\packageExtension.ps1 -version ${{ env.GitVersion_AssemblySemVer }} -outfolder "./staging"

      - name: "List staged artifacts"
        shell: pwsh
        if: steps.Build.outcome == 'success'
        run: Get-ChildItem -Path ./staging/ -Recurse | ForEach-Object { $_.FullName }

      - uses: actions/upload-artifact@v5
        with:
          name: AzureDevOpsMigrationTools-Packages
          path: ./staging/**

  # ────────────────────────────────────────────
  # GitHub Release
  # ────────────────────────────────────────────
  GitHubRelease:
    name: "Release to GitHub Releases"
    runs-on: ubuntu-latest
    needs: [build, Setup]
    if: >-
      success() &&
      needs.Setup.outputs.nkdAgility_RunRelease == 'True'
    env:
      GitVersion_SemVer: ${{ needs.Setup.outputs.GitVersion_SemVer }}
      nkdAgility_Ring: ${{ needs.Setup.outputs.nkdAgility_Ring }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: AzureDevOpsMigrationTools-Packages

      - name: "List release files"
        shell: pwsh
        run: Get-ChildItem -Path .\ -Recurse | ForEach-Object { $_.FullName }

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MigrationTools-*.zip
            nkdAgility.vsts-sync-migration-*.vsix
            vsts-sync-migrator.*.nupkg
          generate_release_notes: true
          tag_name: v${{ needs.Setup.outputs.GitVersion_SemVer }}
          name: v${{ needs.Setup.outputs.GitVersion_SemVer }} (${{ needs.Setup.outputs.nkdAgility_Ring }})
          prerelease: ${{ needs.Setup.outputs.nkdAgility_Ring != 'Production' }}
          draft: ${{ needs.Setup.outputs.nkdAgility_Ring == 'Canary' }}
          body: |
            ## Azure DevOps Migration Tools v${{ needs.Setup.outputs.GitVersion_SemVer }}
            Ring: ${{ needs.Setup.outputs.nkdAgility_Ring }}

            Built from fork — Chocolatey / Winget / Marketplace releases skipped.

            ### Download
            - **[MigrationTools-${{ needs.Setup.outputs.GitVersion_SemVer }}.zip](https://github.com/${{ github.repository }}/releases/download/v${{ needs.Setup.outputs.GitVersion_SemVer }}/MigrationTools-${{ needs.Setup.outputs.GitVersion_SemVer }}.zip)**
